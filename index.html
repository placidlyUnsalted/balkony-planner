<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUNNEN Planner — Balcony Tile Makeover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  :root {
    --bg: #E9E9E5;
    --bg2: #F0F0EC;
    --surface: #FFFFFF;
    --surface2: #F4F4F1;
    --ink: #15171C;
    --ink-soft: #6B6F77;
    --line: #E1E1DB;
    --accent: #00BFA5;
    --accent-deep: #00A992;
    --accent-soft: rgba(0, 191, 165, 0.14);
    --on-accent: #04231F;
    --rail: #FFFFFF;
    --leaf: #00BFA5;
    --tex-col: transparent;
    --display: 'Archivo', system-ui, sans-serif;
    --sans: 'Archivo', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --label-font: 'JetBrains Mono', ui-monospace, monospace;
    --radius: 12px;
    --radius-sm: 8px;
    --btn-radius: 8px;
    --sample-radius: 8px;
    --border-w: 1px;
    --shadow: 0 1px 2px rgba(20, 22, 28, 0.06);
    --shadow-lg: 0 12px 36px rgba(20, 22, 28, 0.14);
    --rail-w: 70px;
    --aside-w: 336px;
    --wordmark-spacing: -0.02em;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: none;
    background-size: 24px 24px;
    opacity: 0.55;
  }

  header {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    padding: 15px 26px;
    background: var(--surface);
    border-bottom: var(--border-w) solid var(--line);
    position: relative;
    z-index: 5;
  }

  .wordmark-group {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  #wordmark {
    font-family: var(--display);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: var(--wordmark-spacing);
    color: var(--ink);
  }

  .wordmark-text {
    font-family: var(--display);
    font-weight: 500;
    font-size: 22px;
    color: var(--ink-soft);
  }

  #wordmark-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    background: var(--accent);
    display: inline-block;
    align-self: flex-end;
    margin-bottom: 5px;
  }

  #head-controls {
    margin-left: auto;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .seg {
    display: inline-flex;
    align-items: center;
    background: var(--surface2);
    border: var(--border-w) solid var(--line);
    border-radius: var(--btn-radius);
    padding: 2px;
    gap: 2px;
  }

  .seg button {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 12px;
    line-height: 1;
    padding: 7px 13px;
    border: none;
    border-radius: calc(var(--btn-radius) - 2px);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .seg button.on {
    background: var(--ink);
    color: var(--surface);
  }

  .seg button:hover:not(.on) {
    background: var(--surface);
  }

  #app-layout {
    flex: 1;
    display: grid;
    grid-template-columns: var(--rail-w) 1fr var(--aside-w);
    min-height: 0;
    position: relative;
    z-index: 1;
  }

  #tool-rail {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 12px 10px;
    background: var(--rail);
    border-right: var(--border-w) solid var(--line);
  }

  .rail-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    height: 54px;
    border: var(--border-w) solid transparent;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: var(--label-font);
    font-size: 9px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .rail-btn svg {
    width: 21px;
    height: 21px;
  }

  .rail-btn svg * {
    stroke: currentColor;
  }

  .rail-btn.active {
    background: var(--ink);
    color: var(--surface);
  }

  .rail-btn.shape-active {
    background: var(--accent);
    border-color: var(--accent-deep);
    color: var(--on-accent);
  }

  .rail-btn.shape-active svg * {
    stroke: var(--on-accent);
  }

  .rail-sep {
    width: 32px;
    height: 1.5px;
    background: var(--line);
    margin: 2px 0;
  }

  #stage {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: auto;
  }

  .stage-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .stage-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  #dims-label {
    font-family: var(--label-font);
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 5px;
    letter-spacing: 0.02em;
  }

  .stage-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 12.5px;
    padding: 8px 13px;
    background: var(--surface);
    color: var(--ink);
    border: var(--border-w) solid var(--line);
    border-radius: var(--btn-radius);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.08s;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn.primary {
    background: var(--accent);
    color: var(--on-accent);
    border-color: var(--accent-deep);
  }

  #shape-banner {
    display: none;
    margin-bottom: 12px;
    background: var(--accent-soft);
    border: 1.5px dashed var(--accent);
    color: var(--accent);
    font-size: 12.5px;
    font-weight: 700;
    border-radius: var(--radius-sm);
    padding: 9px 13px;
  }

  body.shape-mode #shape-banner {
    display: block;
  }

  #board-host {
    background: var(--surface);
    border: var(--border-w) solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 18px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }

  svg#board {
    width: 100%;
    height: auto;
    display: block;
    touch-action: pinch-zoom;
    cursor: crosshair;
    user-select: none;
  }

  .stage-footer {
    font-family: var(--label-font);
    font-size: 10.5px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 16px;
    letter-spacing: 0.03em;
    line-height: 1.7;
  }

  #inspector {
    background: var(--bg2);
    border-left: var(--border-w) solid var(--line);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: auto;
  }

  .card {
    background: var(--surface);
    border: var(--border-w) solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .card-title {
    font-family: var(--label-font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 13px;
  }

  #swatches {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .swatch {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    background: var(--surface2);
    border: var(--border-w) solid var(--line);
    border-radius: var(--btn-radius);
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 600;
    transition: all 0.15s;
  }

  .swatch:hover {
    transform: translateY(-1px);
  }

  .swatch.selected {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .swatch-chip {
    width: 34px;
    height: 34px;
    border-radius: var(--sample-radius);
    flex: none;
    border: var(--border-w) solid rgba(0, 0, 0, 0.15);
  }

  #presets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .preset {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 12px;
    background: var(--surface2);
    color: var(--ink);
    border: var(--border-w) solid var(--line);
    border-radius: var(--btn-radius);
    cursor: pointer;
    transition: transform 0.08s;
  }

  .preset:hover {
    transform: translateY(-1px);
    background: var(--surface);
  }

  .preset svg {
    width: 22px;
    height: 22px;
    flex: none;
    border-radius: 3px;
  }

  #ab-rows {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ab-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .ab-label {
    display: inline-grid;
    place-items: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--surface);
    font-weight: 700;
    font-size: 12px;
    flex: none;
  }

  .ab-chips {
    display: flex;
    gap: 6px;
  }

  .ab-chip {
    width: 24px;
    height: 24px;
    border-radius: var(--sample-radius);
    border: var(--border-w) solid rgba(0, 0, 0, 0.2);
    cursor: pointer;
    transition: transform 0.08s;
  }

  .ab-chip:hover {
    transform: translateY(-1px);
  }

  .ab-chip.sel {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .ab-name {
    font-size: 11.5px;
    color: var(--ink-soft);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #design-name {
    width: 100%;
    min-width: 0;
    font-family: var(--sans);
    font-size: 13px;
    padding: 9px 11px;
    border: var(--border-w) solid var(--line);
    border-radius: var(--btn-radius);
    background: var(--surface);
    color: var(--ink);
  }

  #design-name::placeholder {
    color: var(--ink-soft);
    opacity: 0.8;
  }

  #save-row {
    display: flex;
    gap: 8px;
  }

  #design-list {
    margin-top: 11px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .design-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: var(--btn-radius);
  }

  .design-item .name {
    flex: 1;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .design-item button {
    font-family: var(--sans);
    font-size: 11.5px;
    font-weight: 700;
    padding: 4px 9px;
    border: var(--border-w) solid var(--ink);
    border-radius: calc(var(--btn-radius) - 2px);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
  }

  .design-item button.del {
    border-color: var(--accent-deep);
    color: var(--accent-deep);
  }

  .design-item button.del.confirm {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--on-accent);
  }

  .empty-note {
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 8px;
  }

  #shoplist {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 13px;
  }

  .shop-row {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .shop-chip {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: var(--border-w) solid rgba(0, 0, 0, 0.2);
    flex: none;
  }

  .shop-nm {
    flex: 1;
  }

  .shop-ct {
    font-weight: 700;
  }

  .shop-pk {
    color: var(--ink-soft);
    font-size: 12px;
    min-width: 64px;
    text-align: right;
  }

  #shoptotal {
    margin-top: 11px;
    padding-top: 11px;
    border-top: 1.5px dashed var(--line);
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  #toast {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--ink);
    color: var(--surface);
    font-size: 13px;
    font-weight: 700;
    font-family: var(--sans);
    padding: 11px 22px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    z-index: 90;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    transition: opacity 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 1040px) {
    #app-layout {
      grid-template-columns: 1fr;
    }
    #tool-rail {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      flex-direction: row;
      width: auto;
      height: auto;
      border-right: none;
      border-top: var(--border-w) solid var(--line);
      z-index: 60;
      justify-content: center;
      gap: 6px;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
    }
    .rail-btn {
      width: 48px;
      height: 46px;
      flex: none;
    }
    .rail-sep {
      width: 1.5px;
      height: 30px;
    }
    #stage {
      order: -1;
    }
    #inspector {
      border-left: none;
      border-top: var(--border-w) solid var(--line);
    }
    body {
      padding-bottom: 80px;
    }
  }

  @media (max-width: 560px) {
    #head-controls {
      width: 100%;
    }
    #stage {
      padding: 14px;
    }
  }

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 6px;
    border: 2px solid var(--bg2);
  }

  input::placeholder {
    color: var(--ink-soft);
    opacity: 0.8;
  }

  @keyframes rn-rise {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: none;
    }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark-group">
    <span id="wordmark">RUNNEN</span>
    <span class="wordmark-text">Planner</span>
    <span id="wordmark-dot"></span>
  </div>
  <div id="head-controls">
    <div class="seg" id="dir-seg">
      <button data-dir="atelier">Atelier</button>
      <button data-dir="terrace">Terrace</button>
    </div>
    <div class="seg" id="lang-seg">
      <button data-lang="en">EN</button>
      <button data-lang="pl">PL</button>
    </div>
    <div class="seg" id="theme-seg">
      <button data-theme-pref="light">☀</button>
      <button data-theme-pref="auto">Auto</button>
      <button data-theme-pref="dark">☾</button>
    </div>
  </div>
</header>

<div id="app-layout">
  <nav id="tool-rail">
    <button class="rail-btn active" id="tool-paint" data-tool="paint" title="Paint (P)">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 14l9-9 5 5-9 9H5a1 1 0 0 1-1-1v-4z" stroke-width="1.8" stroke-linejoin="round"/><path d="M13 5l5 5" stroke-width="1.8"/></svg>
      <span data-i18n="paint">Paint</span>
    </button>
    <button class="rail-btn" id="tool-erase" data-tool="erase" title="Erase (E)">
      <svg viewBox="0 0 24 24" fill="none"><path d="M7 16l8-8 4 4-6 6H9l-2-2z" stroke-width="1.8" stroke-linejoin="round"/><path d="M4 20h16" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span data-i18n="erase">Erase</span>
    </button>
    <button class="rail-btn" id="tool-shape" data-tool="shape" title="Shape (S)">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 4h10v8h6v8H4V4z" stroke-width="1.8" stroke-linejoin="round" stroke-dasharray="3 2.5"/></svg>
      <span data-i18n="shape">Shape</span>
    </button>
    <div class="rail-sep"></div>
    <button class="rail-btn" id="tool-quarter" title="Quarter brush (Q)">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="1.5" stroke-width="1.7"/><path d="M12 4v16M4 12h16" stroke-width="1.4"/><rect x="4.6" y="4.6" width="7.4" height="7.4" fill="currentColor" opacity="0.22"/></svg>
      <span id="quarter-label" data-i18n="quarterShort">Quarter</span>
    </button>
    <div class="rail-sep"></div>
    <button class="rail-btn" id="undo-rail" title="Undo (Ctrl+Z)" style="font-size: 18px">↶</button>
    <button class="rail-btn" id="redo-rail" title="Redo (Ctrl+Y)" style="font-size: 18px">↷</button>
  </nav>

  <main id="stage">
    <div class="stage-head">
      <div>
        <div class="stage-title" data-i18n="yourBalcony">Your balcony</div>
        <div id="dims-label"></div>
      </div>
      <div class="stage-actions">
        <button class="btn" id="export-btn" title="Download PNG">PNG ↓</button>
        <button class="btn" id="clear-btn" data-i18n="clear">Clear tiles</button>
      </div>
    </div>
    <div id="shape-banner" data-i18n="shapeBanner"></div>
    <div id="board-host">
      <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="stage-footer" data-i18n-html="footer"></div>
  </main>

  <aside id="inspector">
    <section class="card">
      <div class="card-title" data-i18n="tileHeader">RUNNEN tile</div>
      <div id="swatches"></div>
    </section>

    <section class="card">
      <div class="card-title" data-i18n="patterns">Patterns</div>
      <div id="presets"></div>
      <div id="ab-rows"></div>
      <p style="font-size: 11.5px; color: var(--ink-soft); margin-top: 11px; line-height: 1.5;" data-i18n-html="patternsHint"></p>
    </section>

    <section class="card">
      <div class="card-title" data-i18n="designs">Designs</div>
      <div id="save-row" style="display: flex; gap: 8px;">
        <input id="design-name" type="text" maxlength="40">
        <button class="btn primary" id="save-btn" data-i18n="save">Save</button>
      </div>
      <div id="design-list"></div>
    </section>

    <section class="card">
      <div class="card-title" data-i18n="shopping">Shopping list</div>
      <div id="shoplist"></div>
      <div id="shoptotal"></div>
    </section>
  </aside>
</div>

<div id="toast"></div>

<script>
"use strict";

/* ───── CONSTANTS ───── */
const COLS = 17, ROWS = 10, CELL = 30, Q = 15, PACK = 9;
const SVGNS = "http://www.w3.org/2000/svg";
const LS_DESIGNS = "runnen-designs-v1", LS_CURRENT = "runnen-current-v1";
const LS_LANG = "runnen-lang", LS_THEME = "runnen-theme", LS_DIR = "runnen-dir-v2";

const VARIANTS = [
  { id: "brown",     base: "#6E4A2F", slat: "#5C3C24", hi: "#7E5A3C", kind: "wood" },
  { id: "graybrown", base: "#8C8074", slat: "#776C60", hi: "#9C9184", kind: "wood" },
  { id: "darkgray",  base: "#4A4E52", slat: "#3D4144", hi: "#585D61", kind: "plastic" },
  { id: "lightgray", base: "#B7BABB", slat: "#A3A7A8", hi: "#C6C9CA", kind: "plastic" },
  { id: "grass",     base: "#4E7A3C", slat: "#3E6530", hi: "#639449", kind: "grass" },
];
const VMAP = Object.fromEntries(VARIANTS.map(v => [v.id, v]));

/* ───── THEMES (Atelier & Terrace, Light & Dark) ───── */
const THEMES = {
  atelier: {

/* ───── STATE ───── */
const k = (r,c) => r + "," + c;
function defaultFootprint() {
  const fp = new Set();
  for (let r = 0; r < 5; r++) for (let c = 0; c < COLS; c++) fp.add(k(r, c));
  for (let r = 5; r < ROWS; r++) for (let c = 0; c < 5; c++) fp.add(k(r, c));
  return fp;
}
let footprint = defaultFootprint();
let tiles = new Map();
let mode = "paint", precision = "tile", selected = "brown", patternB = "graybrown";
let undoStack = [], redoStack = [], dragging = false, shapeAdd = true;
const quads = e => Array.isArray(e) ? e : [e,e,e,e];

/* ───── PERSISTENCE ───── */
const serialize = () => ({ footprint:[...footprint], tiles:[...tiles.entries()] });
const deserialize = d => { footprint = new Set(d.footprint); tiles = new Map(d.tiles); };
const autosave = () => { try { localStorage.setItem(LS_CURRENT, JSON.stringify(serialize())); } catch(e){} };

/* ───── UNDO / REDO ───── */
function pushUndo(){ undoStack.push(JSON.stringify(serialize())); if (undoStack.length > 80) undoStack.shift(); redoStack.length = 0; }
function undo(){ const p = undoStack.pop(); if (!p) { toast(t("tNoUndo")); return; } redoStack.push(JSON.stringify(serialize())); deserialize(JSON.parse(p)); refresh(); }
function redo(){ const n = redoStack.pop(); if (!n) { toast(t("tNoRedo")); return; } undoStack.push(JSON.stringify(serialize())); deserialize(JSON.parse(n)); refresh(); }

/* ───── TILE RENDERING (jitter + quad SVG) ───── */
function jitter(r,c,n){ let h = (r*73856093)^(c*19349663)^(n*83492791); h = (h^(h>>13))*1274126177; return ((h^(h>>16))>>>0)/4294967295; }
function quadSVG(r,c,qi,vid){
  const v = VMAP[vid];
  const x = c*CELL+(qi%2)*Q, y = r*CELL+(qi>>1)*Q;
  const horiz = qi===0||qi===3;
  const jbase = qi*101;
  let s = `<rect x="${x}" y="${y}" width="${Q}" height="${Q}" fill="${v.base}"/>`;
  if (v.kind==="grass"){
    for(let i=0;i<9;i++){
      const gx = x+1.5+jitter(r,c,jbase+i)*(Q-3), gy = y+2+jitter(r,c,jbase+i+30)*(Q-5);
      const len = 2+jitter(r,c,jbase+i+60)*2.2;
      const lean = (jitter(r,c,jbase+i+90)-0.5)*2.6;
      const col = jitter(r,c,jbase+i+120)>0.5 ? v.hi : v.slat;
      s += `<path d="M${gx.toFixed(1)} ${(gy+len).toFixed(1)} q${lean.toFixed(1)} ${(-len).toFixed(1)} ${(lean*1.4).toFixed(1)} ${(-len-1).toFixed(1)}" stroke="${col}" stroke-width="0.85" fill="none" stroke-linecap="round"/>`;
    }
  } else {
    const slats = 2, sw = Q/slats;
    for(let i=0;i<slats;i++){
      const off = i*sw;
      const shade = jitter(r,c,jbase+i)*0.16-0.08;
      const tone = shade>0 ? v.hi : v.base;
      if (horiz){
        s += `<rect x="${x}" y="${y+off+0.7}" width="${Q}" height="${sw-1.4}" fill="${tone}" opacity="${0.55+Math.abs(shade)*3}"/>`;
        s += `<line x1="${x}" y1="${y+off}" x2="${x+Q}" y2="${y+off}" stroke="${v.slat}" stroke-width="1.1"/>`;
      } else {
        s += `<rect x="${x+off+0.7}" y="${y}" width="${sw-1.4}" height="${Q}" fill="${tone}" opacity="${0.55+Math.abs(shade)*3}"/>`;
        s += `<line x1="${x+off}" y1="${y}" x2="${x+off}" y2="${y+Q}" stroke="${v.slat}" stroke-width="1.1"/>`;
      }
    }
  }
  s += `<rect x="${x+0.3}" y="${y+0.3}" width="${Q-0.6}" height="${Q-0.6}" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="0.6"/>`;
  return s;
}
function tileSVG(r,c,entry){
  const arr = quads(entry);
  const x = c*CELL, y = r*CELL;
  let s = `<g id="tg-${r}-${c}">`;
  for(let qi=0;qi<4;qi++) if (arr[qi]) s += quadSVG(r,c,qi,arr[qi]);
  s += `<rect x="${x+0.5}" y="${y+0.5}" width="${CELL-1}" height="${CELL-1}" fill="none" stroke="rgba(0,0,0,.28)" stroke-width="1"/>`;
  s += `</g>`;
  return s;
}

/* ───── BOARD RENDERING ───── */
const board = document.getElementById("board");
const M = 46, W = COLS*CELL, H = ROWS*CELL;
board.setAttribute("viewBox", `${-M} ${-M} ${W+M+16} ${H+M+16}`);

function boundaryLines(){
  let s = "";
  for (const cell of footprint){
    const [r,c] = cell.split(",").map(Number);
    const x = c*CELL, y = r*CELL;
    if (!footprint.has(k(r-1,c))) s += `<line x1="${x}" y1="${y}" x2="${x+CELL}" y2="${y}"/>`;
    if (!footprint.has(k(r+1,c))) s += `<line x1="${x}" y1="${y+CELL}" x2="${x+CELL}" y2="${y+CELL}"/>`;
    if (!footprint.has(k(r,c-1))) s += `<line x1="${x}" y1="${y}" x2="${x}" y2="${y+CELL}"/>`;
    if (!footprint.has(k(r,c+1))) s += `<line x1="${x+CELL}" y1="${y}" x2="${x+CELL}" y2="${y+CELL}"/>`;
  }
  return s;
}

function rulers(){
  const B = boardCol();
  const wM = (COLS*0.3).toFixed(1), hM = (ROWS*0.3).toFixed(1);
  let s = `<g font-family="var(--label-font)" font-size="11" fill="${B.ruler}">`;
  s += `<line x1="0" y1="${-M+22}" x2="${W}" y2="${-M+22}" stroke="${B.ruler}" stroke-width="1"/>`;
  s += `<line x1="0" y1="${-M+17}" x2="0" y2="${-M+27}" stroke="${B.ruler}" stroke-width="1"/>`;
  s += `<line x1="${W}" y1="${-M+17}" x2="${W}" y2="${-M+27}" stroke="${B.ruler}" stroke-width="1"/>`;
  s += `<text x="${W/2}" y="${-M+14}" text-anchor="middle" font-weight="700">${wM} m · ${COLS} tiles</text>`;
  s += `<line x1="${-M+22}" y1="0" x2="${-M+22}" y2="${H}" stroke="${B.ruler}" stroke-width="1"/>`;
  s += `<line x1="${-M+17}" y1="0" x2="${-M+27}" y2="0" stroke="${B.ruler}" stroke-width="1"/>`;
  s += `<line x1="${-M+17}" y1="${H}" x2="${-M+27}" y2="${H}" stroke="${B.ruler}" stroke-width="1"/>`;
  s += `<text x="${-M+12}" y="${H/2}" text-anchor="middle" font-weight="700" transform="rotate(-90 ${-M+12} ${H/2})">${hM} m · ${ROWS} tiles</text>`;
  for(let c=1;c<COLS;c++) s += `<line x1="${c*CELL}" y1="${-M+20}" x2="${c*CELL}" y2="${-M+24}" stroke="${B.tick}" stroke-width="0.7"/>`;
  for(let r=1;r<ROWS;r++) s += `<line x1="${-M+20}" y1="${r*CELL}" x2="${-M+24}" y2="${r*CELL}" stroke="${B.tick}" stroke-width="0.7"/>`;
  s += `</g>`;
  return s;
}

function render(){
  const B = boardCol();
  let s = `<g>`;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if (!footprint.has(k(r,c))){
      s += `<rect x="${c*CELL+1.5}" y="${r*CELL+1.5}" width="${CELL-3}" height="${CELL-3}" rx="2.5"
              fill="${mode==="shape" ? B.ghostFill : "none"}"
              stroke="${mode==="shape" ? B.ghostShape : B.ghost}" stroke-width="${mode==="shape" ? 1 : 0.8}"
              stroke-dasharray="3 3" opacity="${mode==="shape" ? 0.9 : 0.55}"/>`;
    }
  }
  s += `</g>`;
  s += `<g>`;
  for (const cell of footprint){
    const [r,c] = cell.split(",").map(Number);
    s += `<rect x="${c*CELL}" y="${r*CELL}" width="${CELL}" height="${CELL}" fill="${B.concrete}"/>`;
    s += `<circle cx="${c*CELL+8+jitter(r,c,1)*14}" cy="${r*CELL+8+jitter(r,c,2)*14}" r="0.9" fill="${B.speckle}"/>`;
    s += `<circle cx="${c*CELL+6+jitter(r,c,3)*18}" cy="${r*CELL+6+jitter(r,c,4)*18}" r="0.7" fill="${B.speckle}"/>`;
  }
  s += `</g>`;
  s += `<g stroke="${B.grid}" stroke-width="0.6">`;
  for (const cell of footprint){
    const [r,c] = cell.split(",").map(Number);
    s += `<rect x="${c*CELL}" y="${r*CELL}" width="${CELL}" height="${CELL}" fill="none"/>`;
  }
  s += `</g>`;
  s += `<g id="tilelayer">`;
  for (const [cell, entry] of tiles){
    const [r,c] = cell.split(",").map(Number);
    if (footprint.has(cell)) s += tileSVG(r,c,entry);
  }
  s += `</g>`;
  s += `<g stroke="${B.outline}" stroke-width="2.4" stroke-linecap="square">${boundaryLines()}</g>`;
  s += rulers();
  s += `<rect id="hover-cell" x="0" y="0" width="${CELL}" height="${CELL}" fill="none" stroke="${B.ghostShape}" stroke-width="2" rx="2" visibility="hidden" pointer-events="none"/>`;
  board.innerHTML = s;
}

function patchTile(r,c){
  const layer = document.getElementById("tilelayer");
  if (!layer){ render(); return; }
  const key = k(r,c);
  const node = document.getElementById(`tg-${r}-${c}`);
  if (node) node.remove();
  if (tiles.has(key) && footprint.has(key)){
    layer.insertAdjacentHTML("beforeend", tileSVG(r,c,tiles.get(key)));
  }
}

/* ───── STATS ───── */
const FRAC = ["", "¼", "½", "¾"];
function fmtQuarters(q){
  const whole = Math.floor(q/4), rem = q%4;
  if (whole===0 && rem>0) return FRAC[rem];
  return whole + FRAC[rem];
}

function updateStats(){
  const counts = {};
  let laidQ = 0;
  for (const [cell, entry] of tiles){
    if (!footprint.has(cell)) continue;
    for (const vid of quads(entry)){
      if (!vid) continue;
      counts[vid] = (counts[vid]||0)+1;
      laidQ++;
    }
  }
  const list = document.getElementById("shoplist");
  const used = VARIANTS.filter(v=>counts[v.id]);
  list.innerHTML = used.length ? used.map(v=>{
    const q = counts[v.id], packs = Math.ceil(q/(4*PACK));
    return `<div class="shop-row">
      <span class="shop-chip" style="background:${v.base}"></span>
      <span class="shop-nm">${t("variants")[v.id]}</span>
      <span class="shop-ct">${fmtQuarters(q)}</span>
      <span class="shop-pk">${t("pack")(packs)}</span>
    </div>`;
  }).join("") : `<div class="empty-note">${t("noTiles")}</div>`;
  const total = footprint.size;
  const area = (total*0.09).toFixed(2);
  const pct = total ? Math.round((laidQ/(total*4))*100) : 0;
  document.getElementById("shoptotal").innerHTML = t("shopTotal")(total, area, fmtQuarters(laidQ), pct);
  document.getElementById("dims-label").textContent = t("dims")((COLS*0.3).toFixed(1), (ROWS*0.3).toFixed(1), total);
}

function refresh(){ render(); updateStats(); autosave(); }

/* ───── POINTER INTERACTION ───── */
function cellFromEvent(e){
  const rect = board.getBoundingClientRect();
  const vb = board.viewBox.baseVal;
  const x = vb.x + (e.clientX-rect.left)/rect.width*vb.width;
  const y = vb.y + (e.clientY-rect.top)/rect.height*vb.height;
  const c = Math.floor(x/CELL), r = Math.floor(y/CELL);
  if (r<0||r>=ROWS||c<0||c>=COLS) return null;
  const qc = Math.floor((x-c*CELL)/Q), qr = Math.floor((y-r*CELL)/Q);
  return { r, c, qi: Math.min(1,Math.max(0,qr))*2+Math.min(1,Math.max(0,qc)) };
}

function applyAt(cell, first){
  if (!cell) return;
  const key = k(cell.r, cell.c);
  if (mode==="shape"){
    if (first) shapeAdd = !footprint.has(key);
    if (shapeAdd) footprint.add(key);
    else { footprint.delete(key); tiles.delete(key); }
    refresh();
    return;
  }
  if (mode==="erase"){
    if (!tiles.has(key)) return;
    if (precision==="quarter"){
      const arr = quads(tiles.get(key)).slice();
      if (!arr[cell.qi]) return;
      arr[cell.qi] = null;
      if (arr.every(v=>!v)) tiles.delete(key);
      else tiles.set(key, arr);
    } else {
      tiles.delete(key);
    }
  } else {
    if (!footprint.has(key)) return;
    if (precision==="quarter"){
      const arr = quads(tiles.get(key)??null).slice();
      if (arr[cell.qi]===selected) return;
      arr[cell.qi] = selected;
      tiles.set(key, arr.every(v=>v===selected)?selected:arr);
    } else {
      if (tiles.get(key)===selected) return;
      tiles.set(key, selected);
    }
  }
  patchTile(cell.r, cell.c);
  updateStats();
  autosave();
}

board.addEventListener("pointerdown", e=>{
  e.preventDefault();
  board.setPointerCapture(e.pointerId);
  dragging = true;
  pushUndo();
  applyAt(cellFromEvent(e), true);
});
board.addEventListener("pointermove", e=>{
  const cell = cellFromEvent(e);
  const hov = document.getElementById("hover-cell");
  if (hov){
    if (cell){
      const qh = precision==="quarter" && mode!=="shape";
      const sz = qh?Q:CELL;
      hov.setAttribute("width", sz);
      hov.setAttribute("height", sz);
      hov.setAttribute("x", cell.c*CELL+(qh?(cell.qi%2)*Q:0));
      hov.setAttribute("y", cell.r*CELL+(qh?(cell.qi>>1)*Q:0));
      hov.setAttribute("visibility", "visible");
    } else hov.setAttribute("visibility", "hidden");
  }
  if (dragging) applyAt(cell, false);
});
["pointerup", "pointercancel"].forEach(ev=>
  board.addEventListener(ev, ()=>{ dragging = false; }));
board.addEventListener("pointerleave", ()=>{
  const hov = document.getElementById("hover-cell");
  if (hov) hov.setAttribute("visibility", "hidden");
});

/* ───── TOOLS ───── */
function setMode(m){
  mode = m;
  document.querySelectorAll("#tool-rail .rail-btn[data-tool]").forEach(btn=>{
    const isThis = btn.dataset.tool===m;
    btn.classList.toggle("active", isThis && m!=="shape");
    btn.classList.toggle("shape-active", isThis && m==="shape");
  });
  document.body.classList.toggle("shape-mode", m==="shape");
  render();
}

document.getElementById("tool-paint").onclick = () => setMode("paint");
document.getElementById("tool-erase").onclick = () => setMode("erase");
document.getElementById("tool-shape").onclick = () => setMode(mode==="shape"?"paint":"shape");

function setPrecision(p){
  precision = p;
  const lbl = document.getElementById("quarter-label");
  lbl.textContent = p==="quarter" ? t("quarterShort") : t("fullShort");
  document.getElementById("tool-quarter").classList.toggle("active", p==="quarter");
}
document.getElementById("tool-quarter").onclick = () => setPrecision(precision==="quarter"?"tile":"quarter");

/* ───── PALETTE ───── */
function chipSVG(v){
  let s = `<svg viewBox="0 0 26 26"><rect width="26" height="26" fill="${v.base}"/>`;
  if (v.kind==="grass"){
    for(let i=0;i<9;i++)
      s += `<line x1="${3+i*2.6}" y1="${20-(i%3)*4}" x2="${3.8+i*2.6}" y2="${15-(i%3)*4}" stroke="${v.hi}" stroke-width="1" stroke-linecap="round"/>`;
  } else {
    for(let i=0;i<2;i++){
      const o = 4+i*6;
      s += `<line x1="0" y1="${o}" x2="13" y2="${o}" stroke="${v.slat}" stroke-width="1.1"/>`;
      s += `<line x1="${13+o}" y1="0" x2="${13+o}" y2="13" stroke="${v.slat}" stroke-width="1.1"/>`;
      s += `<line x1="${o}" y1="13" x2="${o}" y2="26" stroke="${v.slat}" stroke-width="1.1"/>`;
      s += `<line x1="13" y1="${13+o}" x2="26" y2="${13+o}" stroke="${v.slat}" stroke-width="1.1"/>`;
    }
    s += `<line x1="13" y1="0" x2="13" y2="26" stroke="${v.slat}" stroke-width="0.8" opacity="0.7"/>`;
    s += `<line x1="0" y1="13" x2="26" y2="13" stroke="${v.slat}" stroke-width="0.8" opacity="0.7"/>`;
  }
  s += `</svg>`;
  return s;
}

function selectColor(vid){
  selected = vid;
  if (mode==="erase" || mode==="shape") setMode("paint");
  renderPalette();
}

function renderPalette(){
  const el = document.getElementById("swatches");
  el.innerHTML = VARIANTS.map(v=>
    `<div class="swatch ${v.id===selected?"selected":""}" data-v="${v.id}">
       <span class="swatch-chip" style="background:${v.base}">${chipSVG(v)}</span>
       <span>${t("variants")[v.id]}</span>
     </div>`).join("");
  el.querySelectorAll(".swatch").forEach(s=>{
    s.onclick = () => selectColor(s.dataset.v);
  });
  renderAB();
}

function renderAB(){
  const el = document.getElementById("ab-rows");
  const row = (label, cur) => {
    const chips = VARIANTS.map(v=>
      `<span class="ab-chip ${v.id===cur?"sel":""}" data-v="${v.id}" style="background:${v.base}" title="${t("variants")[v.id]}"></span>`).join("");
    return `<div class="ab-row">
      <span class="ab-label">${label}</span>
      <div class="ab-chips">${chips}</div>
      <span class="ab-name">${t("variants")[cur]}</span>
    </div>`;
  };
  el.innerHTML = row("A", selected) + row("B", patternB);
  el.querySelector('[class="ab-row"]').querySelectorAll(".ab-chip").forEach(ch=>ch.onclick=()=>selectColor(ch.dataset.v));
  el.querySelectorAll('[class="ab-row"]')[1].querySelectorAll(".ab-chip").forEach(ch=>ch.onclick=()=>{ patternB=ch.dataset.v; renderAB(); });
}

/* ───── PRESETS ───── */
const PRESETS = [
  { id:"checker", fn:(r,c)=>(r+c)%2===0 },
  { id:"stripes-h", fn:(r,c)=>r%2===0 },
  { id:"stripes-v", fn:(r,c)=>c%2===0 },
  { id:"diagonal", fn:(r,c)=>Math.floor((r+c)/2)%2===0 },
  { id:"border", fn:null },
  { id:"fill", fn:()=>true },
];

function presetIcon(p){
  let s = `<svg viewBox="0 0 22 22"><rect width="22" height="22" fill="var(--surface2)"/>`;
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    let on;
    if (p.id==="border") on = r===0||r===3||c===0||c===3;
    else on = p.fn(r,c);
    s += `<rect x="${c*5.5}" y="${r*5.5}" width="5.5" height="5.5" fill="${on?"#C2603C":"#8C8074"}"/>`;
  }
  s += `</svg>`;
  return s;
}

function applyPreset(p){
  pushUndo();
  const A = selected, B = patternB;
  const isEdge = cell=>{
    const [r,c] = cell.split(",").map(Number);
    return !(footprint.has(k(r-1,c))&&footprint.has(k(r+1,c))&&footprint.has(k(r,c-1))&&footprint.has(k(r,c+1)));
  };
  for (const cell of footprint){
    const [r,c] = cell.split(",").map(Number);
    let useA;
    if (p.id==="border") useA = isEdge(cell);
    else useA = p.fn(r,c);
    tiles.set(cell, useA?A:B);
  }
  if (p.id==="fill") for (const cell of footprint) tiles.set(cell,A);
  refresh();
  toast(t("tPattern")(t("presets")[p.id]));
}

function renderPresets(){
  const el = document.getElementById("presets");
  el.innerHTML = PRESETS.map(p=>`<button class="preset" data-p="${p.id}">${presetIcon(p)}<span>${t("presets")[p.id]}</span></button>`).join("");
  el.querySelectorAll(".preset").forEach(b=>b.onclick=()=>applyPreset(PRESETS.find(p=>p.id===b.dataset.p)));
}

/* ───── DESIGNS ───── */
function renderDesigns(){
  const designs = getDesigns();
  const names = Object.keys(designs).sort();
  const el = document.getElementById("design-list");
  el.innerHTML = names.length ? names.map(n=>`<div class="design-item">
    <span class="name" title="${n}">${n}</span>
    <button data-load="${n}">${t("load")}</button>
    <button class="del" data-del="${n}">✕</button>
  </div>`).join("") : `<div class="empty-note">${t("noDesigns")}</div>`;
  el.querySelectorAll("[data-load]").forEach(b=>b.onclick=()=>{
    pushUndo();
    deserialize(designs[b.dataset.load]);
    refresh();
    toast(t("tLoaded")(b.dataset.load));
  });
  el.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    if (!b.classList.contains("confirm")){
      b.classList.add("confirm");
      b.textContent = t("confirmDel");
      setTimeout(()=>{
        if (b.isConnected){ b.classList.remove("confirm"); b.textContent="✕"; }
      }, 2500);
      return;
    }
    const d = getDesigns();
    delete d[b.dataset.del];
    setDesigns(d);
    renderDesigns();
    toast(t("tDeleted")(b.dataset.del));
  });
}

document.getElementById("save-btn").onclick = ()=>{
  const input = document.getElementById("design-name");
  const name = input.value.trim() || t("defaultDesign")+" "+new Date().toLocaleDateString();
  const d = getDesigns();
  d[name] = serialize();
  setDesigns(d);
  input.value = "";
  renderDesigns();
  toast(t("tSaved")(name));
};

/* ───── PNG EXPORT ───── */
document.getElementById("export-btn").onclick = ()=>{
  const clone = board.cloneNode(true);
  clone.querySelector("#hover-cell")?.remove();
  const vb = board.viewBox.baseVal;
  const scale = 3;
  clone.setAttribute("width", vb.width);
  clone.setAttribute("height", vb.height);
  const svgText = new XMLSerializer().serializeToString(clone);
  const url = URL.createObjectURL(new Blob([svgText], { type:"image/svg+xml;charset=utf-8" }));
  const img = new Image();
  img.onload = () =>{
    const canvas = document.createElement("canvas");
    canvas.width = vb.width*scale;
    canvas.height = vb.height*scale;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = getComputedStyle(document.getElementById("board-host")).backgroundColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "balkon-runnen-plan.png";
    a.click();
    toast(t("tExported"));
  };
  img.onerror = () => URL.revokeObjectURL(url);
  img.src = url;
};

/* ───── THEME SWITCHING ───── */
document.querySelectorAll("#dir-seg button").forEach(b=>b.onclick=()=>{
  direction = b.dataset.dir;
  localStorage.setItem(LS_DIR, direction);
  updateDirButtons();
  applyVars();
});

document.querySelectorAll("#theme-seg button").forEach(b=>b.onclick=()=>{
  themePref = b.dataset.themePref;
  localStorage.setItem(LS_THEME, themePref);
  updateThemeButtons();
  applyVars();
});

function updateDirButtons(){
  document.querySelectorAll("#dir-seg button").forEach(b=>b.classList.toggle("on", b.dataset.dir===direction));
}

function updateThemeButtons(){
  document.querySelectorAll("#theme-seg button").forEach(b=>b.classList.toggle("on", b.dataset.themePref===themePref));
}

darkMedia.addEventListener("change", ()=>{ if (themePref==="auto") applyVars(); });

/* ───── LANGUAGE ───── */
function applyLang(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{ el.innerHTML = t(el.dataset.i18nHtml); });
  document.getElementById("design-name").placeholder = t("namePlaceholder");
  document.querySelectorAll("#lang-seg button").forEach(b=>b.classList.toggle("on", b.dataset.lang===lang));
  renderPalette();
  renderPresets();
  renderDesigns();
  updateStats();
}

document.querySelectorAll("#lang-seg button").forEach(b=>b.onclick=()=>{
  lang = b.dataset.lang;
  localStorage.setItem(LS_LANG, lang);
  applyLang();
});

/* ───── MISC UI ───── */
document.getElementById("undo-rail").onclick = undo;
document.getElementById("redo-rail").onclick = redo;
document.getElementById("clear-btn").onclick = ()=>{
  if (tiles.size===0) return;
  pushUndo();
  tiles.clear();
  refresh();
  toast(t("tCleared"));
};

let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 1800);
}

document.addEventListener("keydown", e=>{
  if (e.target.tagName==="INPUT") return;
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z" && e.shiftKey){ e.preventDefault(); redo(); }
  else if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z"){ e.preventDefault(); undo(); }
  else if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="y"){ e.preventDefault(); redo(); }
  else if (e.key.toLowerCase()==="p") setMode("paint");
  else if (e.key.toLowerCase()==="e") setMode("erase");
  else if (e.key.toLowerCase()==="s") setMode("shape");
  else if (e.key.toLowerCase()==="q") setPrecision(precision==="quarter"?"tile":"quarter");
});

/* ───── BOOT ───── */
loadAutosave();
applyVars();
applyLang();
updateDirButtons();
updateThemeButtons();
refresh();
</script>
</body>
</html>
